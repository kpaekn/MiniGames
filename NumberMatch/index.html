<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Number Match</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=DynaPuff:wght@400;600;700&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL@24,400,1" rel="stylesheet" />
    <!-- Phaser 3 CDN -->
    <script src="https://cdn.jsdelivr.net/npm/phaser@3/dist/phaser.min.js"></script>
    <style>
      :root {
        --page-bg: radial-gradient(circle at top, #ffffff, #f0f2f5);
      }
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      body {
        background: var(--page-bg);
        color: #1a1a2e;
        font-family: 'DynaPuff', system-ui, -apple-system, BlinkMacSystemFont,
          'Segoe UI', sans-serif;
        display: flex;
        flex-direction: column;
        min-height: 100vh;
        align-items: center;
        justify-content: flex-start;
      }
      header {
        padding: 1rem 1.5rem 0.5rem;
        text-align: center;
      }
      header h1 {
        font-size: 1.75rem;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        font-weight: 700;
      }
      header p {
        margin-top: 0.35rem;
        font-size: 0.9rem;
        color: #5a6070;
      }
      #controls {
        display: flex;
        gap: 0.75rem;
        align-items: center;
        justify-content: center;
        padding: 0.5rem 1.5rem 1rem;
        flex-wrap: wrap;
        font-size: 0.9rem;
      }
      #controls label {
        display: flex;
        align-items: center;
        gap: 0.25rem;
      }
      #controls select,
      #controls button {
        background: #ffffff;
        border-radius: 999px;
        border: 1px solid #c0c4cc;
        color: #1a1a2e;
        padding: 0.35rem 0.85rem;
        cursor: pointer;
        font-size: 0.9rem;
      }
      #controls button {
        font-weight: 600;
        display: inline-flex;
        align-items: center;
        gap: 0.25rem;
      }
      #controls button .material-symbols-rounded {
        font-size: 1.1rem;
      }
      #controls button:hover {
        background: #e8eaed;
      }
      #game-container {
        display: flex;
        justify-content: center;
        align-items: flex-start;
        padding: 0.5rem 1rem 1.5rem;
        width: 100%;
        max-width: 900px;
      }
      #phaser-root {
        border-radius: 1rem;
        overflow: hidden;
        height: 640px;
      }
      footer {
        padding-bottom: 1rem;
        font-size: 0.75rem;
        color: #8890a0;
        text-align: center;
      }
    </style>
  </head>
  <body>
    <header>
      <h1>Number Match</h1>
      <p>Select two numbers in a line: same value or sum to 10.</p>
    </header>

    <div id="controls">
      <label>
        Grid size:
        <select id="grid-size-select">
          <option value="3">3 × 3</option>
          <option value="5">5 × 5</option>
          <option value="7">7 × 7</option>
          <option value="9" selected>9 × 9</option>
          <option value="11">11 × 11</option>
          <option value="13">13 × 13</option>
          <option value="15">15 × 15</option>
          <option value="17">17 × 17</option>
        </select>
      </label>
      <button id="hint-btn" type="button"><span class="material-symbols-rounded" style="color: #f59e0b;">lightbulb</span> Hint</button>
      <button id="restart-btn"><span class="material-symbols-rounded">refresh</span> Restart</button>
    </div>

    <div id="game-container">
      <div id="phaser-root"></div>
    </div>

    <script type="module" src="./main.js"></script>
  </body>
</html>
